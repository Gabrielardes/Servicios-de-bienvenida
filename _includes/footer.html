<div class="page__footer">
  <footer>

    <!-- REDES -->
    {% if site.footer.links %}
      <ul class="social-icons">
        {% for link in site.footer.links %}
          <li>
            <a href="{{ link.url }}" target="_blank">
              <i class="{{ link.icon }}"></i> {{ link.label }}
            </a>
          </li>
        {% endfor %}
      </ul>
    {% endif %}

    <!-- SLOGAN -->
    <p style="text-align:center; font-weight:600; font-size:16px; margin-top:15px;">
      Estas en buenas manos
    </p>

    <!-- COPYRIGHT -->
    <p style="text-align:center; font-size:14px; margin:5px 0;">
      © 2026 Servicios de Bienvenida
    </p>

    <!-- LEGAL -->
    <p style="text-align:center; font-size:12px; opacity:0.7;">
      Todos los derechos reservados
    </p>

  </footer>
</div>
