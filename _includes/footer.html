<div class="page__footer">
  <footer>

    <!-- REDES (usa config automáticamente) -->
    {% if site.footer.links %}
      <ul class="social-icons">
        {% for link in site.footer.links %}
          <li>
            <a href="{{ link.url }}" target="_blank">
              <i class="{{ link.icon }}"></i> {{ link.label }}
            </a>
          </li>
        {% endfor %}
      </ul>
    {% endif %}

    <!-- DIVISOR -->
    <div style="width:60px; height:2px; background:#c8a96a; margin:20px auto;"></div>

    <!-- SLOGAN -->
    <p style="text-align:center; color:#c8a96a; font-weight:600; font-size:18px;">
      Estas en buenas manos
    </p>

    <!-- COPYRIGHT -->
    <p style="text-align:center; color:#6b4f3b;">
      © 2026 Servicios de Bienvenida
    </p>

    <!-- LEGAL -->
    <p style="text-align:center; font-size:12px; color:#a89c8f;">
      Todos los derechos reservados
    </p>

  </footer>
</div>
